name: CI/CD Dokploy Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1. Configurar Node para correr los validadores
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Validar HTML (Sintaxis y etiquetas cerradas)
      - name: Validar HTML
        run: |
          npx htmlhint "**/*.html" --rules "tag-pair,attr-lowercase,spec-char-escape,id-unique,src-not-empty,tagname-lowercase"

      # 3. Validar CSS (Sintaxis y buenas prácticas)
      - name: Validar CSS
        run: |
          npx stylelint "**/*.css" --allow-empty-input

      # 4. Validar JS (Incluso si es poco, evita errores de sintaxis)
      - name: Validar JS
        run: |
          npx eslint "**/*.js" --no-eslintrc --rule '{"no-undef": "error", "no-unused-vars": "warn"}' --env browser --allow-empty-input

      # --- Si todo lo anterior pasa, procedemos con Docker ---
      - name: Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}